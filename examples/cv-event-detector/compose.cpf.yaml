# ── Cross-machine deployment ────────────────────────────────────────────────
# Machine 1 (this file): nv-cv-event-detector + cv-ui
# Machine 2            : event_reviewer stack  (via-server, alert-bridge, …)
#
# Shared storage: ALERT_REVIEW_MEDIA_BASE_DIR must be the same path on both
#                 machines, e.g. via NFS mount.
#
# Required env vars (set in .env or export before running):
#   EVENT_REVIEWER_IP        IP address of Machine 2  (no default — must set)
#   ALERT_REVIEW_MEDIA_BASE_DIR  Shared NFS path       (no default — must set)
# ---------------------------------------------------------------------------

services:

  nv-cv-event-detector:
    image: ${NV_CV_EVENT_DETECTOR_IMAGE:-nvcr.io/nvidia/blueprint/nv-cv-event-detector:2.4.0${IS_SBSA:+-sbsa}}
    networks:
      - cv-local-network
    shm_size: '16gb'
    runtime: nvidia
    ports:
      - "${NV_CV_EVENT_DETECTOR_API_PORT:-23491}:${NV_CV_EVENT_DETECTOR_API_PORT:-23491}"
    entrypoint: ["/opt/nvidia/nv-cv-event-detector/start_nv_cv_event_detector.sh"]

    volumes:
      - via-ngc-model-cache:/root/.via/ngc_model_cache
      - via-hf-cache:/tmp/huggingface
      # Shared NFS folder — clips written here are read by Machine 2
      - "${ALERT_REVIEW_MEDIA_BASE_DIR}:${ALERT_REVIEW_MEDIA_BASE_DIR}"
      - cv-input-dir:/tmp
      - ./gdinoconfig_grpc.txt:/opt/nvidia/nv-cv-event-detector/gdinoconfig_grpc.txt

    environment:
      NV_CV_EVENT_DETECTOR_API_PORT: ${NV_CV_EVENT_DETECTOR_API_PORT:-23491}
      INSTALL_PROPRIETARY_CODECS: "true"
      USE_GDINO: "${USE_GDINO:-true}"
      DISABLE_SOM_OVERLAY: "${DISABLE_SOM_OVERLAY:-false}"
      USE_TRACKER_CONFIG: "${USE_TRACKER_CONFIG:-/opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml}"
      CLIP_CACHE_PRE_EV_TIME: "${CLIP_CACHE_PRE_EV_TIME:-5}"
      CLIP_CACHE_POST_EV_TIME: "${CLIP_CACHE_POST_EV_TIME:-20}"
      ENABLE_FILE_STREAMING_MODE: "${ENABLE_FILE_STREAMING_MODE:-false}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-}"
      LD_LIBRARY_PATH: "/opt/nvidia/deepstream/deepstream/lib:/opt/tritonserver/lib/"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
      stack: 67108864
    ipc: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${NV_CV_EVENT_DETECTOR_API_PORT:-23491}/health"]
      interval: 30s
      timeout: 20s
      retries: 50
      start_period: 90s


  cv-ui:
    build: ./cv_ui
    runtime: nvidia
    networks:
      - cv-local-network
    volumes:
      # Same NFS mount — UI can show output folder path correctly
      - "${ALERT_REVIEW_MEDIA_BASE_DIR}:${ALERT_REVIEW_MEDIA_BASE_DIR}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      # cv-detector is on the same machine — use service name
      - NV_CV_EVENT_DETECTOR_API_URL=${NV_CV_EVENT_DETECTOR_API_URL:-http://nv-cv-event-detector:${NV_CV_EVENT_DETECTOR_API_PORT:-23491}}
      # alert-bridge is on Machine 2 — use real IP
      - NV_ALERTBRIDGE_URL=http://${EVENT_REVIEWER_IP}:9080
      - ALERT_REVIEW_MEDIA_BASE_DIR=${ALERT_REVIEW_MEDIA_BASE_DIR}
      - CV_UI_PORT=7862
    ports:
      - "7862:7862"
    depends_on:
      nv-cv-event-detector:
        condition: service_healthy


volumes:
  cv-input-dir:
  via-ngc-model-cache:
  via-hf-cache:

networks:
  # Local network for Machine 1 services only — no dependency on event_reviewer network
  cv-local-network:
    driver: bridge
